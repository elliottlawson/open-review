name: Open Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open Review
        uses: elliottlawson/open-review-action@v1
        with:
          api_key: ${{ secrets.OPEN_REVIEW_API_KEY }}
