name: Open Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Open Review
        run: npm install -g github:elliottlawson/open-review

      - name: Run Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Uncomment if using OpenAI instead:
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Uncomment if using Linear integration:
          # LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          open-review pr ${{ github.repository }}#${{ github.event.pull_request.number }}
