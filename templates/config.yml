# Open Review Configuration
# https://github.com/elliottlawson/open-review

version: "1.0"

# Review Settings
review:
  # Methodology: 'default' (built-in) or path to custom file
  methodology: default

  # Presets: 'auto' (detect from project files) or list of preset names
  # presets: [laravel, react]

  # Conventions: 'auto' (discover from codebase), path to file, or inline text
  # conventions: ./docs/standards.md
  # conventions: "We use HasRealm for tenancy. Controllers are CRUD-only."

# LLM Settings (optional)
# llm:
#   provider: anthropic        # anthropic, openai, or openrouter
#   model: claude-sonnet-4-20250514

# Output Settings (optional)
# output:
#   format: human              # "human" | "json"
#   colors: auto               # "auto" | "true" | "false"
#   timezone: America/New_York
