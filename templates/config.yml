# Open Review Configuration
# https://github.com/elliottlawson/open-review

# LLM Settings
llm:
  # Provider: anthropic, openai, or openrouter
  provider: anthropic
  
  # Model to use for reviews
  model: claude-sonnet-4-20250514

# Review Behavior
review:
  # Path to your conventions/instructions file
  # instructions_file: CONVENTIONS.md
  
  # Inline instructions (prepended to file content if both present)
  # instructions: |
  #   - Use PSR-12 coding standards
  #   - All public methods must have docblocks
  
  # Flag PRs with no description
  flag_empty_description: true
  
  # Skip review entirely if all changed files match these patterns
  # skip_if_only:
  #   - "*.lock"
  #   - "*.md"

# Output Settings
# output:
#   format: human           # "human" | "json"
#   colors: auto            # "auto" | "true" | "false"
#   timezone: America/New_York
#   path: ./reviews/latest.json
#   sections:
#     must_fix:
#       enabled: true
#       collapse: auto      # "auto" | "always" | "never"
#     should_fix:
#       enabled: true
#       collapse: auto
#     suggestions:
#       enabled: true
#       collapse: auto
#     questions:
#       enabled: true
#       collapse: auto
#   verdicts:
#     approve:
#       label: "LGTM"
#     changes_needed:
#       label: "Changes Needed"
#     hold:
#       label: "Hold"

# Files/patterns to ignore (glob patterns)
# These are skipped during review
ignore:
  - "*.lock"
  - "node_modules/**"
  - "vendor/**"
  - "dist/**"
